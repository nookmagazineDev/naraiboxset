<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2C94C" />
      <stop offset="100%" stop-color="#F2994A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="400" height="300" rx="20" fill="url(#bgGrad)" />

  <!-- Ambient Light Orbs -->
  <circle cx="80" cy="80" r="100" fill="#ffffff" opacity="0.08" filter="url(#glow)" />
  <circle cx="320" cy="220" r="120" fill="#000000" opacity="0.15" filter="url(#glow)" />

  <!-- Decorative Border -->
  <rect x="12" y="12" width="376" height="276" rx="16" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15" />

  <!-- Category Badge -->
  <g transform="translate(20, 25)">
    <rect width="80" height="24" rx="12" fill="#ffffff" fill-opacity="0.2" />
    <text x="40" y="16" font-family="'Inter', 'Kanit', sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">เบียร์</text>
  </g>

  <!-- Food Icon Container -->
  <g transform="translate(200, 95)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="42" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="0" y="14" font-size="44" text-anchor="middle">🍺</text>
  </g>

  <!-- Dish Title (Thai) -->
  <text x="200" y="185" font-family="'Kanit', 'Sarabun', 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">ยกลัง 777</text>

  <!-- Dish Subtitle (English) -->
  <text x="200" y="210" font-family="'Inter', 'Outfit', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#ffffff" fill-opacity="0.8" text-anchor="middle" filter="url(#shadow)">ยกลัง 777</text>

  <!-- Price Tag -->
  <g transform="translate(200, 250)" filter="url(#shadow)">
    <rect x="-60" y="-16" width="120" height="32" rx="16" fill="#ffffff" />
    <text x="0" y="6" font-family="'Outfit', 'Inter', 'Kanit', sans-serif" font-size="15" font-weight="800" fill="#d35400">฿777</text>
  </g>
</svg>